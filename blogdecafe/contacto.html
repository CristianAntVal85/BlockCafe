<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Café</title>

    <link  rel="stylesheet">
    
        <!-- Preload -->
    <link rel="preload" href="css/normalize.css" as="style">
    <link rel="stylesheet" href="css/normalize.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bitcount+Prop+Single:wght@100..900&family=Gabarito:wght@400..900&family=Spinnaker&family=Staatliches&display=swap" crossorigin>
    
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="header">

        <div class="contenedor">
            <div class="barra">
                <a class="logo" href="index.html">
                <h1 class="logo__nombre no-margin centrar-texto">Blog<span class="logo__bold">DeCafé</span></h1>
                </a>

                <nav class="navegacion">
                    <a href="nosotros.html" class="navegacion__enlace">Nosotros</a>
                    <a href="cursos.html" class="navegacion__enlace">Cursos</a>
                    <a href="contacto.html" class="navegacion__enlace">Contacto</a>
                </nav>
            </div>
        </div>

        <div class="header__texto">
            <h2 class="no-margin">Blog de café con consejos y cursos</h2>
            <p class="no_margin">Aprende de los expertos con las mejores recetas y consejos</p>
        </div> 

    </header>

    <div class="contenedor">
        <main class="contacto">
            <h3 class="centrar-texto">Contacto</h3>

            <div class="contacto-bg"></div>

            <form class="formulario" action="#" method="post">
                <div class="campo">
                    <label class="campo__label" for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" class="campo__field">
                </div>
                <div class="campo">
                    <label class="campo__label" for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Tu E-mail" class="campo__field">
                </div>
                <div class="campo">
                    <label class="campo__label" for="mensaje">Mensaje</label>
                    <textarea id="mensaje" rows="10" colm="100" class="campo__field campo__field--textarea"></textarea>
                </div>
                <div class="campo">
                    <input class="boton boton--primario" type="submit" value="Enviar">
                </div>
            </form>
            
            
        </main>
    </div>

    <footer class="footer">
        <div class="contenedor">
            <div class="barra">
                <a class="logo" href="index.html">
                    <h1 class="logo__nombre no-margin centrar-texto">Blog<span class="logo__bold">DeCafé</span></h1>
                </a>
                <nav class="navegacion">
                    <a href="nosotros.html" class="navegacion__enlace">Nosotros</a>
                    <a href="cursos.html" class="navegacion__enlace">Cursos</a>
                    <a href="contacto.html" class="navegacion__enlace">Contacto</a>
                </nav>
            </div>
        </div>
    </footer>
    <script src="js/scripts.js"></script>
</body>
</html>
